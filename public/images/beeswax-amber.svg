<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ba-bg" cx="50%" cy="50%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1A0C04"/>
      <stop offset="60%" stop-color="#0C0602"/>
      <stop offset="100%" stop-color="#040200"/>
    </radialGradient>
    <radialGradient id="ba-ambient" cx="50%" cy="48%" r="58%">
      <stop offset="0%" stop-color="#D88020" stop-opacity="0.25"/>
      <stop offset="55%" stop-color="#A05010" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ba-wax-top" cx="42%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#F0C055"/>
      <stop offset="45%" stop-color="#D89535"/>
      <stop offset="100%" stop-color="#B07020"/>
    </radialGradient>
    <radialGradient id="ba-wax-side" cx="38%" cy="40%" r="68%">
      <stop offset="0%" stop-color="#E8B040"/>
      <stop offset="35%" stop-color="#D09030"/>
      <stop offset="75%" stop-color="#B07020"/>
      <stop offset="100%" stop-color="#7A4A10"/>
    </radialGradient>
    <radialGradient id="ba-inner-glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#F5A820" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#D07010" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ba-flame-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFC030" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#E08010" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ba-floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C07820" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ba-saucer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#180C04" stop-opacity="0.8"/>
      <stop offset="25%" stop-color="#785030" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#987050" stop-opacity="0.55"/>
      <stop offset="75%" stop-color="#705030" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#0C0802" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="ba-blur-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="32"/>
    </filter>
    <filter id="ba-blur-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="ba-blur-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#ba-bg)"/>

  <!-- Ambient warm honey atmosphere -->
  <ellipse cx="300" cy="400" rx="270" ry="310" fill="url(#ba-ambient)" filter="url(#ba-blur-lg)"/>

  <!-- Floor warm glow -->
  <ellipse cx="300" cy="730" rx="210" ry="55" fill="url(#ba-floor)" filter="url(#ba-blur-lg)"/>

  <!-- Ceramic saucer -->
  <ellipse cx="300" cy="714" rx="145" ry="20" fill="url(#ba-saucer)"/>
  <rect x="158" y="706" width="284" height="16" rx="6" fill="#7A5030" opacity="0.18"/>
  <ellipse cx="300" cy="706" rx="140" ry="10" fill="#987050" opacity="0.1"/>
  <!-- Saucer rim highlight -->
  <ellipse cx="300" cy="706" rx="140" ry="10" fill="rgba(0,0,0,0)" stroke="#B08050" stroke-width="1" stroke-opacity="0.15"/>

  <!-- Shadow under candle -->
  <ellipse cx="300" cy="708" rx="105" ry="16" fill="rgba(0,0,0,0.65)" filter="url(#ba-blur-sm)"/>

  <!-- Wax body (main pillar) -->
  <rect x="198" y="385" width="204" height="320" rx="6" fill="url(#ba-wax-side)"/>

  <!-- Wax texture variation (natural imperfection left side) -->
  <rect x="198" y="420" width="204" height="285" rx="5" fill="url(#ba-wax-side)" opacity="0.3"/>

  <!-- Natural wax surface imperfection / slight shadow crease -->
  <rect x="240" y="400" width="3" height="300" rx="1" fill="rgba(0,0,0,0.08)"/>
  <rect x="355" y="410" width="2" height="280" rx="1" fill="rgba(0,0,0,0.06)"/>

  <!-- Inner glow (flame illuminates through top) -->
  <rect x="200" y="385" width="200" height="180" rx="5" fill="url(#ba-inner-glow)"/>

  <!-- Wax top surface (visible from slight above angle) -->
  <ellipse cx="300" cy="388" rx="102" ry="16" fill="url(#ba-wax-top)" opacity="0.92"/>
  <!-- Wax pool around wick -->
  <ellipse cx="300" cy="388" rx="55" ry="9" fill="#F5D870" opacity="0.45"/>

  <!-- Candle left highlight (light from above-left) -->
  <rect x="200" y="390" width="14" height="312" rx="3" fill="rgba(255,220,140,0.18)"/>

  <!-- Candle right shadow -->
  <rect x="386" y="393" width="16" height="308" rx="3" fill="rgba(0,0,0,0.22)"/>

  <!-- Subtle wax drip (left side, natural beeswax) -->
  <path d="M216,530 C214,545 215,562 217,572 C219,580 220,582 219,575 C218,560 218,548 220,535 Z" fill="#C09035" opacity="0.55"/>
  <!-- Small second drip -->
  <path d="M370,490 C372,505 371,520 369,528 C368,534 368,536 369.5,530 C371,518 371,506 369,496 Z" fill="#B88530" opacity="0.4"/>

  <!-- Wick -->
  <line x1="300" y1="388" x2="299" y2="370" stroke="#2A1A08" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="299.5" y1="382" x2="299" y2="372" stroke="#3A2210" stroke-width="1" stroke-opacity="0.4"/>

  <!-- Flame halo (blurred ambient) -->
  <ellipse cx="300" cy="345" rx="46" ry="58" fill="url(#ba-flame-halo)" filter="url(#ba-blur-md)"/>

  <!-- Flame outer (rich amber) -->
  <path d="M300,370 C295,360 289,346 291.5,330 C294,316 300,322 300,322 C300,322 306,316 308.5,330 C311,346 305,360 300,370 Z" fill="#F09510" opacity="0.9"/>

  <!-- Flame mid (orange-gold) -->
  <path d="M300,368 C296.5,360 293,349 295,337 C297,325 300.5,330 300.5,330 C300.5,330 303,325 305,337 C307,349 303.5,360 300,368 Z" fill="#FFBA20" opacity="0.88"/>

  <!-- Flame inner core -->
  <path d="M300,364 C298,358 297,352 298,344 C299,337 301,341 300.5,347 C300,354 300,364 300,364 Z" fill="#FFF0A0" opacity="0.95"/>

  <!-- Flame tip bright point -->
  <ellipse cx="300" cy="325" rx="2.5" ry="4" fill="#FFFCE0" opacity="0.75"/>

  <!-- Label band on pillar (subtle, pressed into wax look) -->
  <rect x="198" y="578" width="204" height="58" fill="rgba(0,0,0,0.32)"/>
  <rect x="198" y="578" width="204" height="1" fill="rgba(200,155,60,0.22)"/>
  <rect x="198" y="635" width="204" height="1" fill="rgba(180,140,50,0.18)"/>

  <!-- Label text -->
  <text x="300" y="599" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="rgba(215,172,88,0.72)" letter-spacing="6">LUMINIS</text>
  <text x="300" y="619" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="rgba(238,198,110,0.92)" letter-spacing="1" font-style="italic">Beeswax Amber</text>
  <text x="300" y="630" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="rgba(185,145,65,0.5)" letter-spacing="3">PURE BEESWAX · 260g</text>
</svg>
