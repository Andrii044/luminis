<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="wi-bg" cx="50%" cy="48%" r="70%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0E0E18"/>
      <stop offset="55%" stop-color="#070710"/>
      <stop offset="100%" stop-color="#030306"/>
    </radialGradient>
    <radialGradient id="wi-ambient" cx="50%" cy="44%" r="52%">
      <stop offset="0%" stop-color="#C0C8E8" stop-opacity="0.14"/>
      <stop offset="50%" stop-color="#8090C0" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wi-glow-top" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#D0D8F0" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#A0B0D8" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="wi-vessel-body" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#E8EAF4"/>
      <stop offset="40%" stop-color="#D0D4E8"/>
      <stop offset="100%" stop-color="#B0B4CC"/>
    </radialGradient>
    <radialGradient id="wi-floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8090C0" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wi-vessel-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1A1A2C" stop-opacity="0.6"/>
      <stop offset="8%" stop-color="#C8CCE2" stop-opacity="0.55"/>
      <stop offset="25%" stop-color="#E4E6F4" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#F0F2FA" stop-opacity="0.85"/>
      <stop offset="75%" stop-color="#D0D4EC" stop-opacity="0.75"/>
      <stop offset="92%" stop-color="#A8ACCA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0C0C1A" stop-opacity="0.65"/>
    </linearGradient>
    <linearGradient id="wi-lid-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30304A" stop-opacity="0.8"/>
      <stop offset="20%" stop-color="#9898BC" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C0C2D8" stop-opacity="0.7"/>
      <stop offset="80%" stop-color="#8888AA" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#202030" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="wi-surface" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3A3A5A" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#101020" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="wi-blur-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="wi-blur-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <filter id="wi-blur-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#wi-bg)"/>

  <!-- Ambient cool atmosphere -->
  <ellipse cx="300" cy="360" rx="240" ry="280" fill="url(#wi-ambient)" filter="url(#wi-blur-lg)"/>

  <!-- Floor reflection -->
  <ellipse cx="300" cy="710" rx="180" ry="50" fill="url(#wi-floor)" filter="url(#wi-blur-lg)"/>

  <!-- Glow from top of vessel -->
  <ellipse cx="300" cy="285" rx="110" ry="130" fill="url(#wi-glow-top)" filter="url(#wi-blur-md)"/>

  <!-- Surface beneath vessel -->
  <rect x="190" y="704" width="220" height="12" rx="4" fill="url(#wi-surface)"/>
  <ellipse cx="300" cy="710" rx="114" ry="8" fill="rgba(30,30,55,0.4)"/>

  <!-- Shadow -->
  <ellipse cx="300" cy="706" rx="95" ry="12" fill="rgba(0,0,0,0.65)" filter="url(#wi-blur-sm)"/>

  <!-- Vessel body — frosted porcelain look -->
  <rect x="218" y="295" width="164" height="410" rx="4" fill="url(#wi-vessel-grad)"/>

  <!-- Subtle internal structure (wax layers) -->
  <rect x="226" y="400" width="148" height="2" fill="rgba(160,165,195,0.2)"/>
  <rect x="226" y="500" width="148" height="1" fill="rgba(140,145,175,0.15)"/>

  <!-- Vessel left highlight -->
  <rect x="222" y="300" width="10" height="400" rx="2" fill="rgba(240,242,255,0.22)"/>

  <!-- Vessel center subtle vertical line (mold seam) -->
  <rect x="299" y="310" width="1" height="395" fill="rgba(180,185,210,0.08)"/>

  <!-- Vessel top glow interior -->
  <rect x="220" y="295" width="160" height="150" rx="4" fill="url(#wi-glow-top)" opacity="0.55"/>

  <!-- Lid / vessel top piece -->
  <rect x="210" y="280" width="180" height="24" rx="4" fill="url(#wi-lid-grad)"/>
  <rect x="213" y="281" width="174" height="8" rx="3" fill="rgba(220,224,244,0.2)"/>
  <rect x="212" y="280" width="176" height="1" fill="rgba(200,210,240,0.35)"/>

  <!-- Inner candle visible through top opening -->
  <rect x="256" y="285" width="88" height="16" rx="2" fill="rgba(220,225,245,0.45)"/>
  <ellipse cx="300" cy="293" rx="44" ry="8" fill="rgba(235,238,252,0.4)"/>

  <!-- Wick -->
  <line x1="300" y1="285" x2="300" y2="268" stroke="#3A3858" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

  <!-- Soft flame glow (very subtle, cool-white) -->
  <ellipse cx="300" cy="256" rx="20" ry="28" fill="#D8E0F8" opacity="0.22" filter="url(#wi-blur-sm)"/>

  <!-- Subtle flame -->
  <path d="M300,268 C297,261 295,253 297,246 C299,240 301,243 301,243 C301,243 303,240 305,246 C307,253 303,261 300,268 Z" fill="#E8EEFF" opacity="0.65"/>
  <path d="M300,265 C298.5,260 298,255 299,250 C300,245 301.5,248 301,253 C300.5,258 300,265 300,265 Z" fill="#FFFFFF" opacity="0.6"/>

  <!-- Label area -->
  <rect x="220" y="530" width="160" height="60" fill="rgba(8,8,18,0.45)"/>
  <rect x="220" y="530" width="160" height="1" fill="rgba(160,165,210,0.25)"/>
  <rect x="220" y="589" width="160" height="1" fill="rgba(140,148,198,0.18)"/>

  <!-- Label text -->
  <text x="300" y="550" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="9" fill="rgba(185,192,228,0.7)" letter-spacing="6">LUMINIS</text>
  <text x="300" y="569" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="rgba(210,216,244,0.88)" letter-spacing="1" font-style="italic">White Iris</text>
  <text x="300" y="582" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="rgba(150,158,200,0.48)" letter-spacing="3">PORCELAIN VESSEL · 180g</text>

  <!-- Subtle decorative line on vessel -->
  <rect x="240" y="460" width="120" height="1" fill="rgba(180,185,220,0.15)"/>
</svg>
