<svg viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="vn-bg" cx="50%" cy="52%" r="72%" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#1E0E06"/>
      <stop offset="55%" stop-color="#0C0604"/>
      <stop offset="100%" stop-color="#040200"/>
    </radialGradient>
    <radialGradient id="vn-ambient" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#D07825" stop-opacity="0.22"/>
      <stop offset="50%" stop-color="#A04E10" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vn-wax" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#F0D898"/>
      <stop offset="40%" stop-color="#DEC07A"/>
      <stop offset="100%" stop-color="#C0A058"/>
    </radialGradient>
    <radialGradient id="vn-inner-glow" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#F0A030" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#C06010" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vn-flame-halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F5B040" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#E07820" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vn-floor" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#B06020" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="vn-glass-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9E7A4A" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#9E7A4A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="vn-glass-right" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#281408" stop-opacity="0"/>
      <stop offset="100%" stop-color="#281408" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="vn-plate" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#180E06" stop-opacity="0.2"/>
      <stop offset="30%" stop-color="#9E8060" stop-opacity="0.2"/>
      <stop offset="70%" stop-color="#8A6A42" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0C0804" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="vn-blur-lg" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="vn-blur-md" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
    <filter id="vn-blur-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <clipPath id="vn-jar-clip">
      <rect x="192" y="328" width="216" height="358" rx="6"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="600" height="800" fill="url(#vn-bg)"/>

  <!-- Ambient warm atmosphere -->
  <ellipse cx="300" cy="380" rx="260" ry="300" fill="url(#vn-ambient)" filter="url(#vn-blur-lg)"/>

  <!-- Floor reflection -->
  <ellipse cx="300" cy="715" rx="200" ry="55" fill="url(#vn-floor)" filter="url(#vn-blur-lg)"/>

  <!-- Ceramic plate / surface -->
  <ellipse cx="300" cy="700" rx="130" ry="16" fill="url(#vn-plate)"/>
  <rect x="172" y="694" width="256" height="14" rx="5" fill="#6A4E30" opacity="0.12"/>
  <ellipse cx="300" cy="694" rx="128" ry="8" fill="#9E7A4A" opacity="0.08"/>

  <!-- Jar drop shadow -->
  <ellipse cx="300" cy="700" rx="100" ry="14" fill="rgba(0,0,0,0.6)" filter="url(#vn-blur-sm)"/>

  <!-- Wax body (visible through glass) -->
  <rect x="194" y="330" width="212" height="356" rx="5" fill="url(#vn-wax)" opacity="0.82"/>

  <!-- Inner glow from flame (top portion of wax) -->
  <rect x="194" y="330" width="212" height="180" rx="5" fill="url(#vn-inner-glow)"/>

  <!-- Glass left side -->
  <rect x="192" y="326" width="26" height="364" rx="5" fill="url(#vn-glass-left)"/>

  <!-- Glass right side -->
  <rect x="382" y="326" width="26" height="364" rx="5" fill="url(#vn-glass-right)"/>

  <!-- Glass left inner highlight -->
  <rect x="196" y="332" width="8" height="352" rx="2" fill="rgba(255,240,200,0.16)"/>

  <!-- Glass right inner subtle reflection -->
  <rect x="396" y="370" width="5" height="100" rx="1" fill="rgba(200,180,140,0.06)"/>

  <!-- Jar top rim -->
  <rect x="190" y="316" width="220" height="22" rx="6" fill="#C0A870" opacity="0.52"/>
  <rect x="192" y="316" width="216" height="10" rx="5" fill="#E8D0A0" opacity="0.22"/>

  <!-- Wax top surface ellipse -->
  <ellipse cx="300" cy="330" rx="106" ry="16" fill="#EAD898" opacity="0.78"/>
  <ellipse cx="300" cy="330" rx="90" ry="10" fill="#F0E0A0" opacity="0.35"/>

  <!-- Wick -->
  <line x1="300" y1="330" x2="299" y2="313" stroke="#2E1C0A" stroke-width="2" stroke-linecap="round"/>
  <line x1="300" y1="325" x2="300.5" y2="316" stroke="#4A2E14" stroke-width="1" stroke-linecap="round" opacity="0.5"/>

  <!-- Flame halo glow (blurred behind flame) -->
  <ellipse cx="300" cy="295" rx="38" ry="50" fill="url(#vn-flame-halo)" filter="url(#vn-blur-md)"/>

  <!-- Flame outer (warm amber) -->
  <path d="M300,314 C295,305 290,292 292.5,278 C295,265 300.5,270 300.5,270 C300.5,270 305,265 307.5,278 C310,292 305,305 300,314 Z" fill="#F0980A" opacity="0.88"/>

  <!-- Flame inner core (brighter) -->
  <path d="M300,310 C297.5,304 296,296 297.5,287 C299,278 301.5,282 301,290 C300.5,298 300,310 300,310 Z" fill="#FDE870" opacity="0.95"/>

  <!-- Flame tip highlight -->
  <ellipse cx="300" cy="275" rx="3" ry="5" fill="#FFFDE0" opacity="0.7"/>

  <!-- Label band -->
  <rect x="192" y="510" width="216" height="56" fill="rgba(4,2,0,0.58)"/>
  <rect x="192" y="510" width="216" height="1" fill="rgba(180,140,70,0.28)"/>
  <rect x="192" y="565" width="216" height="1" fill="rgba(180,140,70,0.22)"/>

  <!-- Label text -->
  <text x="300" y="530" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" fill="rgba(210,175,105,0.75)" letter-spacing="6" font-weight="400">LUMINIS</text>
  <text x="300" y="550" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="rgba(230,200,145,0.9)" letter-spacing="1" font-style="italic">Vetiver Noir</text>
  <text x="300" y="561" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="7" fill="rgba(170,140,90,0.5)" letter-spacing="4">HAND-POURED · 220g</text>
</svg>
